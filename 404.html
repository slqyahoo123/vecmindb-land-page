<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 记忆节点加载异常 | 灵心智算</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
            text-align: center;
            background: #050508;
        }
        .error-code {
            font-size: 10rem;
            font-weight: 900;
            background: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.2;
            position: absolute;
            z-index: 0;
        }
        .content {
            position: relative;
            z-index: 10;
        }
        h1 { margin-bottom: 20px; font-size: 2rem; }
        p { color: var(--text-secondary); margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="error-code">404</div>
    <div class="content">
        <h1>记忆节点加载异常</h1>
        <p>您访问的知识分片不存在或已在 Manifold 中重构。</p>
        <a href="index.html" class="btn-primary">返回记忆中枢</a>
    </div>
    <div class="aurora"></div>
</body>
</html>
