server {
    listen 80;
    server_name localhost;

    # --- 工业级安全加固头 ---
    # 防止跨站脚本攻击 (XSS)
    add_header X-XSS-Protection "1; mode=block";
    # 防止点击劫持
    add_header X-Frame-Options "SAMEORIGIN";
    # 强制 HTTPS (预留 HSTS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload";
    # 正确嗅探 MIME 类型
    add_header X-Content-Type-Options "nosniff";
    # 内容安全策略 (CSP) - 仅允许可信源
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'self' 'unsafe-inline'; connect-src 'self';";

    # 根目录配置
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存策略
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg)$ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Gzip 压缩开启
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # 安全增强
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
